<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Company Management</title>

    <link rel="stylesheet" href="style.css" />

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  </head>

  <body>
    <div class="container">
      <h1>Company Details</h1>

      <div class="form-group">
        <label>Company Name</label>

        <input type="text" id="companyName" placeholder="Enter Company Name" />
      </div>

      <div class="form-group">
        <label>Address</label>

        <input type="text" id="address" placeholder="Enter Address" />
      </div>

      <div class="form-group">
        <label>Work</label>

        <input type="text" id="work" placeholder="Enter Work" />
      </div>

      <div class="form-group">
        <label>Revenue</label>

        <input type="number" id="revenue" placeholder="Enter Revenue" />
      </div>

      <div class="form-group">
        <label>Select File</label>

        <input
          type="file"
          id="companyFile"
          accept=".pdf,.xml,.doc,.docx,.xls,.xlsx,.jpg,.jpeg,.png"
        />
      </div>

      <br />

      <button id="saveCompany">Save Company</button>

      <button id="getCompanies">View Companies</button>

      <p id="message"></p>

      <br /><br />

      <table id="companyTable">
        <thead>
          <tr>
            <th>Company</th>
            <th>Address</th>
            <th>Work</th>
            <th>Revenue</th>
            <th>Document</th>
          </tr>
        </thead>

        <tbody></tbody>
      </table>
    </div>

    <script src="config.js"></script>

    <script src="scripts.js"></script>
  </body>
</html>
